---
- name: Deploy FastAPI application
  hosts: all
  become: true
  gather_facts: true

  vars:
    app_dir: /opt/app
    venv_dir: /opt/app/.venv
    service_name: app
    app_user: ec2-user
    gunicorn_bin: /opt/app/.venv/bin/gunicorn
    app_port: 8000

  tasks:

    # -------------------------------------------------------------------------
    # System packages
    # -------------------------------------------------------------------------
    - name: Update dnf cache
      dnf:
        update_cache: true
      when: ansible_pkg_mgr == "dnf"

    - name: Install system packages (Amazon Linux 2023 / dnf)
      dnf:
        name:
          - python3.11
          - python3.11-pip
          - python3.11-devel
          - nginx
          - git
          - gcc
          - make
        state: present
      when: ansible_pkg_mgr == "dnf"

    - name: Install system packages (Ubuntu / apt)
      apt:
        name:
          - python3.11
          - python3.11-venv
          - python3.11-dev
          - nginx
          - git
          - gcc
          - make
        state: present
        update_cache: true
      when: ansible_pkg_mgr == "apt"

    # -------------------------------------------------------------------------
    # Create venv explicitly (needed on distros where python3.11 ships without
    # ensurepip / venv built in)
    # -------------------------------------------------------------------------
    - name: Install python3.11-pip via get-pip on Amazon Linux if needed
      shell: |
        python3.11 -m ensurepip --upgrade || true
        python3.11 -m pip install --upgrade pip virtualenv || true
      args:
        executable: /bin/bash

    # -------------------------------------------------------------------------
    # Application directory
    # -------------------------------------------------------------------------
    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    # -------------------------------------------------------------------------
    # Copy application source from the checked-out repo
    # -------------------------------------------------------------------------
    - name: Synchronise application source files
      synchronize:
        src: "{{ playbook_dir }}/../"
        dest: "{{ app_dir }}/"
        recursive: true
        delete: false
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=.github"
          - "--exclude=terraform"
          - "--exclude=ansible"
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--exclude=.venv"
          - "--exclude=.env"
      become: false
      # synchronize runs as the ansible-connecting user; dest ownership fixed below

    - name: Fix ownership of application files
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    # -------------------------------------------------------------------------
    # Python virtual environment
    # -------------------------------------------------------------------------
    - name: Create Python 3.11 virtual environment
      command: python3.11 -m venv "{{ venv_dir }}"
      args:
        creates: "{{ venv_dir }}/bin/activate"
      become_user: "{{ app_user }}"

    - name: Upgrade pip inside venv
      command: "{{ venv_dir }}/bin/pip install --upgrade pip"
      become_user: "{{ app_user }}"

    - name: Install application dependencies
      command: "{{ venv_dir }}/bin/pip install -r {{ app_dir }}/requirements.txt"
      become_user: "{{ app_user }}"
      args:
        chdir: "{{ app_dir }}"

    - name: Install gunicorn and uvicorn workers
      command: "{{ venv_dir }}/bin/pip install gunicorn uvicorn[standard]"
      become_user: "{{ app_user }}"

    # -------------------------------------------------------------------------
    # .env file (rendered via shell so empty values are handled safely)
    # -------------------------------------------------------------------------
    - name: Render .env file
      shell: |
        cat > {{ app_dir }}/.env <<'ENVEOF'
        APP_ENV=production
        PORT={{ app_port }}
        HOST=0.0.0.0
        ENVEOF
      args:
        executable: /bin/bash

    - name: Fix .env ownership
      file:
        path: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0640"

    # -------------------------------------------------------------------------
    # systemd service
    # -------------------------------------------------------------------------
    - name: Write systemd service unit
      copy:
        dest: /etc/systemd/system/{{ service_name }}.service
        content: |
          [Unit]
          Description=FastAPI application ({{ service_name }})
          After=network.target

          [Service]
          Type=simple
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ gunicorn_bin }} app.main:app \
                      -k uvicorn.workers.UvicornWorker \
                      -w 4 \
                      -b 0.0.0.0:{{ app_port }} \
                      --access-logfile - \
                      --error-logfile -
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier={{ service_name }}

          [Install]
          WantedBy=multi-user.target
        mode: "0644"

    - name: Reload systemd daemon
      systemd:
        daemon_reload: true

    - name: Enable and start app service
      systemd:
        name: "{{ service_name }}"
        enabled: true
        state: restarted

    # -------------------------------------------------------------------------
    # nginx
    # -------------------------------------------------------------------------
    - name: Remove default nginx site (if present)
      file:
        path: /etc/nginx/conf.d/default.conf
        state: absent
      ignore_errors: true

    - name: Write nginx virtual host configuration
      copy:
        dest: /etc/nginx/conf.d/app.conf
        content: |
          server {
              listen 80 default_server;
              server_name _;

              access_log  /var/log/nginx/app_access.log;
              error_log   /var/log/nginx/app_error.log;

              location / {
                  proxy_pass         http://127.0.0.1:{{ app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_set_header   Upgrade           $http_upgrade;
                  proxy_set_header   Connection        "upgrade";
                  proxy_read_timeout 300s;
                  proxy_connect_timeout 75s;
              }
          }
        mode: "0644"

    - name: Validate nginx configuration
      command: nginx -t
      changed_when: false

    - name: Enable and restart nginx
      systemd:
        name: nginx
        enabled: true
        state: restarted

    # -------------------------------------------------------------------------
    # Health check - confirm the app is answering on localhost:8000/health
    # -------------------------------------------------------------------------
    - name: Wait for application to become healthy (localhost check)
      uri:
        url: "http://localhost:{{ app_port }}/health"
        method: GET
        status_code: 200
        timeout: 10
      register: health_result
      retries: 12
      delay: 10
      until: health_result.status == 200