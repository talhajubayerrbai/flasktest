---
- name: Configure EC2 instance and deploy FastAPI application
  hosts: all
  become: true
  gather_facts: true

  vars:
    app_dir: /opt/app
    venv_dir: /opt/app/.venv
    app_user: ec2-user
    gunicorn_workers: 4
    app_port: 8000

  tasks:
    #  System packages 

    - name: Update system packages (Amazon Linux 2023)
      dnf:
        name: "*"
        state: latest
        update_only: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Install required system packages (Amazon Linux 2023)
      dnf:
        name:
          - python3.11
          - python3.11-pip
          - python3.11-devel
          - nginx
          - gcc
          - git
          - rsync
        state: present
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Update system packages (Ubuntu)
      apt:
        update_cache: true
        upgrade: safe
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install required system packages (Ubuntu)
      apt:
        name:
          - python3.11
          - python3.11-venv
          - python3.11-dev
          - nginx
          - gcc
          - git
          - rsync
        state: present
      when: ansible_facts['os_family'] == 'Debian'

    #  Application directory 

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Copy application source from staging area to app directory
      synchronize:
        src: /tmp/app_source/
        dest: "{{ app_dir }}/"
        recursive: true
        delete: false
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--exclude=.git"
      delegate_to: "{{ inventory_hostname }}"

    - name: Set ownership of application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    #  Python virtual environment 

    - name: Create Python virtual environment at /opt/app/.venv
      command: python3.11 -m venv {{ venv_dir }}
      args:
        creates: "{{ venv_dir }}/bin/activate"
      become_user: "{{ app_user }}"

    - name: Upgrade pip inside virtualenv
      command: "{{ venv_dir }}/bin/pip install --upgrade pip"
      become_user: "{{ app_user }}"

    - name: Install application dependencies from requirements.txt (if present)
      shell: |
        if [ -f {{ app_dir }}/requirements.txt ]; then
          {{ venv_dir }}/bin/pip install -r {{ app_dir }}/requirements.txt
        fi
      become_user: "{{ app_user }}"

    - name: Ensure gunicorn is installed in virtualenv
      command: "{{ venv_dir }}/bin/pip install gunicorn"
      become_user: "{{ app_user }}"

    - name: Ensure uvicorn is installed in virtualenv
      command: "{{ venv_dir }}/bin/pip install 'uvicorn[standard]'"
      become_user: "{{ app_user }}"

    - name: Ensure fastapi is installed in virtualenv
      command: "{{ venv_dir }}/bin/pip install fastapi"
      become_user: "{{ app_user }}"

    #  .env / application config 

    - name: Render application environment file
      shell: |
        cat > {{ app_dir }}/.env << 'ENVEOF'
        APP_ENV=production
        PORT=8000
        HOST=127.0.0.1
        ENVEOF
      args:
        executable: /bin/bash

    - name: Set ownership of .env file
      file:
        path: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0640"

    #  systemd service 

    - name: Write systemd service unit for the FastAPI application
      copy:
        dest: /etc/systemd/system/fastapi-app.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=FastAPI Application (gunicorn + uvicorn)
          After=network.target
          Wants=network-online.target

          [Service]
          Type=notify
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app \
              -k uvicorn.workers.UvicornWorker \
              -w {{ gunicorn_workers }} \
              -b 127.0.0.1:{{ app_port }} \
              --timeout 120 \
              --keep-alive 5 \
              --log-level info \
              --access-logfile - \
              --error-logfile -
          Restart=always
          RestartSec=5
          KillMode=mixed
          TimeoutStopSec=30

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      systemd:
        daemon_reload: true

    - name: Enable and start FastAPI application service
      systemd:
        name: fastapi-app
        enabled: true
        state: restarted

    #  nginx 

    - name: Remove default nginx site configuration (Amazon Linux 2023)
      file:
        path: /etc/nginx/conf.d/default.conf
        state: absent
      ignore_errors: true

    - name: Remove default nginx site configuration (Ubuntu)
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      ignore_errors: true

    - name: Write nginx virtual host configuration
      copy:
        dest: /etc/nginx/conf.d/fastapi-app.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          upstream fastapi_backend {
              server 127.0.0.1:{{ app_port }};
              keepalive 32;
          }

          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name _;

              access_log /var/log/nginx/fastapi-app-access.log;
              error_log  /var/log/nginx/fastapi-app-error.log;

              client_max_body_size 16M;

              location / {
                  proxy_pass         http://fastapi_backend;
                  proxy_http_version 1.1;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_set_header   Connection        "";
                  proxy_read_timeout 120s;
                  proxy_connect_timeout 10s;
              }
          }

    - name: Test nginx configuration
      command: nginx -t
      register: nginx_test
      changed_when: false

    - name: Enable and restart nginx
      systemd:
        name: nginx
        enabled: true
        state: restarted

    #  Post-deploy health check (on-host) 

    - name: Wait for application to be ready (on-host check)
      uri:
        url: "http://127.0.0.1:{{ app_port }}/health/"
        method: GET
        status_code: 200
        timeout: 10
      register: health_result
      retries: 12
      delay: 5
      until: health_result.status == 200